<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws://localhost:5198 https://dev.azure.com https://vssps.dev.azure.com">
  <title>TaskDock</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/section-sidebar.css">
  <link rel="stylesheet" href="./styles/tab-bar.css">
  <link rel="stylesheet" href="./styles/settings-view.css">
  <link rel="stylesheet" href="./styles/diff.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/hljs-theme.css">
  <link rel="stylesheet" href="./styles/ai-review.css">
  <link rel="stylesheet" href="./styles/terminals.css">
  <link rel="stylesheet" href="./styles/workitems.css">
  <link rel="stylesheet" href="./styles/icm.css">
  <link rel="stylesheet" href="./styles/walkthroughs.css">
  <link rel="stylesheet" href="./styles/apply-changes.css">
  <link rel="stylesheet" href="./styles/comment-analysis.css">
  <link rel="stylesheet" href="./styles/about-view.css">
  <link rel="stylesheet" href="./styles/dgrep.css">
  <link rel="stylesheet" href="./styles/plugins.css">
  <link rel="stylesheet" href="./styles/cfv.css">
  <link rel="stylesheet" href="./styles/workspace.css">
  <link rel="stylesheet" href="./styles/tasks.css">
  <link rel="stylesheet" href="./lib/xterm/xterm.css">
</head>
<body>
  <div id="app">
    <!-- Title Bar (for macOS) -->
    <header class="title-bar" id="titleBar">
      <div class="title-bar-drag-region"></div>
      <div class="title-bar-content">
        <span class="app-title">TaskDock</span>
      </div>
    </header>

    <!-- Main App Container -->
    <div class="app-container">
      <!-- Section Sidebar -->
      <nav class="section-sidebar" id="sectionSidebar"></nav>

      <!-- Content Area -->
      <div class="content-area">
        <!-- Tab Bar -->
        <div class="tab-bar" id="tabBar"></div>

        <!-- Tab Content Panels -->
        <div class="tab-content" id="tabContent">
          <!-- Tasks Section Content (default landing page) -->
          <div class="section-content" id="tasksSectionContent">
            <div class="tab-panel active" id="tasksPanel"></div>
          </div>

          <!-- Review Section Content -->
          <div class="section-content hidden" id="reviewSectionContent">
            <!-- Home Tab Content (PR List) -->
            <div class="tab-panel" id="homeTabPanel"></div>

            <!-- PR Review Tab Panels Container (dynamically created) -->
            <div id="prTabPanelsContainer"></div>
          </div>

          <!-- Settings Section Content -->
          <div class="section-content hidden" id="settingsSectionContent">
            <!-- Settings Tab Content -->
            <div class="tab-panel active" id="settingsTabPanel"></div>
          </div>

          <!-- Work Items Section Content -->
          <div class="section-content hidden" id="workItemsSectionContent">
            <div class="tab-panel active" id="workItemsListPanel"></div>
            <div id="workItemTabPanelsContainer"></div>
          </div>

          <!-- DGrep Log Search Section Content -->
          <div class="section-content hidden" id="dgrepSectionContent">
            <div class="tab-panel active" id="dgrepSearchPanel"></div>
          </div>

          <!-- ICM Section Content -->
          <div class="section-content hidden" id="icmSectionContent">
            <div class="tab-panel active" id="icmListPanel"></div>
            <div id="icmTabPanelsContainer"></div>
          </div>

          <!-- Terminals Section Content -->
          <div class="section-content hidden" id="terminalsSectionContent">
            <div id="terminalsScreen" class="screen terminals-screen">
              <div id="terminalsView"></div>
            </div>
          </div>

          <!-- About Section Content -->
          <div class="section-content hidden" id="aboutSectionContent">
            <div class="tab-panel active" id="aboutTabPanel"></div>
          </div>

          <!-- CFV Section Content -->
          <div class="section-content hidden" id="cfvSectionContent">
            <div class="tab-panel active" id="cfvHomePanel"></div>
            <div id="cfvCallPanelsContainer"></div>
          </div>

          <!-- Workspace Section Content -->
          <div class="section-content hidden" id="workspacesSectionContent">
            <div class="tab-panel active" id="workspacesPanel"></div>
          </div>

          <!-- Plugin Section Contents (dynamically populated) -->
          <div id="pluginSectionContents"></div>
        </div>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading...</p>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script src="./lib/xterm/xterm.js"></script>
  <script src="./lib/xterm/addon-fit.js"></script>
  <!-- Initialize Tauri API before app loads -->
  <script type="module" src="./tauri-api.ts"></script>
  <script type="module" src="./app.ts"></script>
</body>
</html>
